<main>
    <div class="projects-filter">
        <mat-form-field class="filter-field">
            <mat-label>Filter projects</mat-label>
            <input matInput type="text" (input)="filterProjects($any($event.target).value)">
        </mat-form-field>

        <button mat-flat-button color="primary" (click)="openNewProjectDialog()">New Project</button>

        <div>
            @if (isLoadingProjects()) {
                <mat-progress-spinner mode="indeterminate" diameter="30"></mat-progress-spinner>
                <span>Loading projects...</span>
            }
            @else {
                <table mat-table [dataSource]="projectDS" class="mat-elevation-z2" matSort #projectsSort="matSort">
                    <ng-container matColumnDef="name">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                        <td mat-cell *matCellDef="let project"> {{ project.name }} </td>
                    </ng-container>
                    <ng-container matColumnDef="startDate">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Start Date </th>
                        <td mat-cell *matCellDef="let project"> {{ project.startDate | date }} </td>
                    </ng-container>
                    <ng-container matColumnDef="endDate">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> End Date </th>
                        <td mat-cell *matCellDef="let project"> {{ project.endDate | date }} </td>
                    </ng-container>
                    <ng-container matColumnDef="status">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
                        <td mat-cell *matCellDef="let project"> {{ project.status }} </td>
                    </ng-container>
                    <ng-container matColumnDef="isPrivate">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Private </th>
                        <td mat-cell *matCellDef="let project"> {{ project.isPrivate ? 'Yes' : 'No' }} </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="projectColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: projectColumns;" (click)="selectProject(row)"></tr>
                </table>

                <mat-paginator #projectPaginator [pageSize]="10" [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons="true"></mat-paginator>
            }
        </div>
    </div>
</main>
