<main>
    <h2 mat-dialog-title>Add a new user</h2>

    <div mat-dialog-content>
        <form [formGroup]="addUserForm">
            <mat-form-field>
                <input matInput placeholder="Username" formControlName="username">
            </mat-form-field>

            @if (isSendingRequest()) {
                <mat-spinner>Please wait...</mat-spinner>
            }
            @else {
                <mat-error>{{ error() }}</mat-error>
            }
        </form>
    </div>

    <div mat-dialog-actions align="end">
        <button mat-button (click)="close()" [disabled]="isSendingRequest()">Close</button>
        <button mat-flat-button (click)="submit()" [disabled]="addUserForm.invalid || isSendingRequest()">Add</button>
    </div>
</main>
