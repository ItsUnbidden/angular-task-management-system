<div class="main-container">
    <mat-card class="table-card" appearance="outlined">
        <mat-card-header>
            <mat-card-title>Users</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="usersFilterForm">
                <mat-form-field>
                    <mat-label>Filter users</mat-label>
                    <input matInput type="text" formControlName="filter">
                </mat-form-field>
                <mat-radio-group formControlName="type">
                    <mat-radio-button value="email">Email</mat-radio-button>
                    <mat-radio-button value="username">Username</mat-radio-button>
                </mat-radio-group>
            </form>
            @if (isLoadingUsers()) {
                <div class="spinner-container">
                    <mat-progress-spinner mode="indeterminate" diameter="30"></mat-progress-spinner>
                    <span>Loading projects...</span>
                </div>
            }
            @else {
                <table mat-table [dataSource]="usersDS"
                    class="mat-elevation-z8"
                    matSort #usersSort="matSort"
                    (matSortChange)="onUsersSort($event)"
                    [matSortActive]="usersTableState().sortActive"
                    [matSortDirection]="usersTableState().sortDirection">
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                        <td mat-cell *matCellDef="let user">{{ user.id }}</td>
                    </ng-container>
                    <ng-container matColumnDef="username">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Username </th>
                        <td mat-cell *matCellDef="let user">{{ user.username }}</td>
                    </ng-container>
                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
                        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
                    </ng-container>
                    <ng-container matColumnDef="role">
                        <th mat-header-cell *matHeaderCellDef> Role </th>
                        <td mat-cell *matCellDef="let user">{{ getUserRoleLocal(user) }}</td>
                    </ng-container>
                    <ng-container matColumnDef="isLocked">
                        <th mat-header-cell *matHeaderCellDef mat-sort-header> Locked </th>
                        <td mat-cell *matCellDef="let user">{{ user.isLocked ? 'Yes' : 'No' }}</td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="userColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: userColumns;" (click)="onSelectUser(row)"></tr>
                </table>

                <mat-paginator #myProjectsPaginator
                    [length]="usersTotalElements()"
                    [pageIndex]="usersTableState().pageIndex"
                    [pageSize]="usersTableState().pageSize"
                    [pageSizeOptions]="[25, 50, 75]"
                    showFirstLastButtons="true"
                    (page)="onUsersPage($event)">
                </mat-paginator>
            }
        </mat-card-content>
    </mat-card>
</div>
